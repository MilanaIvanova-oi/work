<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Студия маникюра "Милка"</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="img/2026-03-20_21-55-19.png" alt="Логотип Студии маникюра">
            </div>
            <nav>
                <ul>
                    <li><a href="salon_manicur.html#services">Услуги</a></li>
                    <li><a href="salon_manicur.html#masters">Мастера</a></li>
                    <li><a href="salon_manicur.html#gallery">Галерея</a></li>
                    <li><a href="salon_manicur.html#contact">Контакты</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <a href="index.html#appointment" class=" btn-primary">Записаться</a>
                <a href="login.html" class="btn-secondary">Вход</a>
                <a href="registration.html" class="btn-register">Регистрация</a>
            </div>
        </div>
    </header>

    <div class="registration-page">
        <div class="container">
            <div class="registration-form-wrapper">
                <h2>Регистрация</h2>
                <form id="registration-form">
                    <label for="reg-name">Ваше имя:</label>
                    <input type="text" id="reg-name" name="name" required placeholder="Введите ваше имя">

                    <label for="reg-username">Логин:</label>
                    <input type="text" id="reg-username" name="username" required placeholder="Придумайте логин">

                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email" name="email" required placeholder="Введите ваш email">

                    <label for="reg-phone">Телефон:</label>
                    <input type="tel" id="reg-phone" name="phone" required placeholder="+7 (___) ___-__-__" maxlength="18" inputmode="tel">

                    <label for="reg-password">Пароль:</label>
                    <input type="password" id="reg-password" name="password" required placeholder="Придумайте пароль">

                    <label for="reg-password-confirm">Подтвердите пароль:</label>
                    <input type="password" id="reg-password-confirm" name="password-confirm" required placeholder="Повторите пароль">

                    <button type="submit" class="btn btn-register-submit">Зарегистрироваться</button>
                </form>
                <p class="registration-footer">Уже есть аккаунт? <a href="login.html">Войти</a></p>
                <p class="registration-back"><a href="index.html">← Вернуться на главную</a></p>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
